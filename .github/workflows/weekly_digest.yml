name: Weekly Math Digest

on:
  schedule:
    - cron: '0 0 * * 0'   # Sunday at 00:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to push to gh-pages branch

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0    # Full history needed for gh-pages push

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore existing gh-pages docs
        run: |
          git fetch origin gh-pages 2>/dev/null || true
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git worktree add _gh_pages origin/gh-pages
            mkdir -p docs
            cp -r _gh_pages/docs/. docs/ 2>/dev/null || true
          else
            mkdir -p docs
          fi

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m grounded.digest --output-dir docs

      - name: Deploy to gh-pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            # Branch already exists — check it out as a worktree
            git worktree add _deploy origin/gh-pages
          else
            # First run — create a fresh orphan repo in _deploy/
            mkdir -p _deploy
            cd _deploy
            git init -b gh-pages
            git remote add origin "$REPO_URL"
            cd ..
          fi

          # Sync generated files
          mkdir -p _deploy/docs
          cp -r docs/. _deploy/docs/
          if [ ! -f _deploy/index.html ]; then
            printf '<meta http-equiv="refresh" content="0; url=docs/index.html">\n' \
              > _deploy/index.html
          fi

          cd _deploy
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "Nothing to commit, skipping push." && exit 0
          git commit -m "digest: week of $(date -u +%Y-%m-%d)"
          git push origin HEAD:gh-pages
