<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Grounded — Weekly Math Digest{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --text: #1a1a2e;
      --muted: #6b7280;
      --border: #e5e7eb;
      --bg: #ffffff;
      --card-bg: #f9fafb;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.65;
      color: var(--text);
      background: var(--bg);
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Nav */
    nav.site-nav {
      border-bottom: 1px solid var(--border);
      padding: 0 1rem;
    }
    nav.site-nav .inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
    }
    .site-wordmark {
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .site-wordmark span { color: var(--accent); }
    nav.site-nav .nav-links a {
      color: var(--muted);
      font-size: 0.9rem;
      margin-left: 1.25rem;
    }
    nav.site-nav .nav-links a:hover { color: var(--accent); text-decoration: none; }

    /* Main content */
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.25rem 1rem;
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
  {% block extra_styles %}{% endblock %}
</head>
<body>

<nav class="site-nav">
  <div class="inner">
    <a href="index.html" class="site-wordmark">Ground<span>ed</span></a>
    <div class="nav-links">
      <a href="index.html">Archive</a>
    </div>
  </div>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

<footer>
  Generated by Grounded using <a href="https://arxiv.org" target="_blank" rel="noopener">arXiv</a> data
  and <a href="https://anthropic.com" target="_blank" rel="noopener">Claude AI</a>.
  Papers sourced from arXiv under a <a href="https://arxiv.org/help/license" target="_blank" rel="noopener">CC license</a>.
</footer>

</body>
</html>
